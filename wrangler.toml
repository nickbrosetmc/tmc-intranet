name = "tmc-intranet"
compatibility_date = "2025-09-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "./dist"

# Pages Functions environment variables. These get set in the Cloudflare dashboard
# (Workers & Pages → tmc-intranet → Settings → Variables and Secrets).
# Listing them here for documentation only.
#
# Required vars (Plaintext):
#   GOOGLE_CLIENT_ID   = "<from Google Cloud Console OAuth client>"
#   ALLOWED_DOMAIN     = "marketingtmc.com"
#
# Required secrets (Secret):
#   GOOGLE_CLIENT_SECRET = <from Google Cloud Console OAuth client>
#   SESSION_SECRET       = <random 32+ byte string, used to sign JWT cookies>
#
# Generate SESSION_SECRET locally with:
#   node -e "console.log(require('crypto').randomBytes(48).toString('base64url'))"

# D1 database binding — uncomment after running `wrangler d1 create tmc-intranet-db`
# [[d1_databases]]
# binding = "DB"
# database_name = "tmc-intranet-db"
# database_id = "TODO_FILL_AFTER_CREATE"

# Local-dev D1 (Miniflare) — same binding, no remote ID needed
# [[env.preview.d1_databases]]
# binding = "DB"
# database_name = "tmc-intranet-db"
# database_id = "TODO_FILL_AFTER_CREATE"
